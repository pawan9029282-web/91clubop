<html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no'><link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap' rel='stylesheet'><style>*{margin:0;padding:0;box-sizing:border-box;user-select:none;}body{background:transparent;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;}#mini{width:65px;height:65px;position:absolute;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1000;}#mini::before{content:'';position:absolute;inset:-4px;border:2px solid #ff003c;border-radius:50%;clip-path:polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);animation:spinHex 3s linear infinite;}#mini img{width:50px;height:50px;border-radius:50%;border:2px solid #ff003c;box-shadow:0 0 20px rgba(255,0,60,0.8);background:#000;animation:pulseRed 1.5s infinite;}@keyframes pulseRed{0%,100%{box-shadow:0 0 10px #ff003c;}50%{box-shadow:0 0 30px #ff003c;}}@keyframes spinHex{100%{transform:rotate(360deg);}}#main{width:220px;background:linear-gradient(180deg, rgba(15,0,5,0.98), rgba(5,0,0,1));border:1px solid #ff003c;border-left:4px solid #ff003c;border-radius:4px 15px 4px 15px;padding:15px;display:none;flex-direction:column;box-shadow:0 0 40px rgba(255,0,60,0.3),inset 0 0 20px rgba(255,0,60,0.1);z-index:1001;animation:cyberEntry 0.4s cubic-bezier(0.175,0.885,0.32,1.275);position:relative;overflow:hidden;}#main::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,0,60,0.2),transparent);animation:radarSweep 3s infinite;}@keyframes radarSweep{100%{left:200%;}}@keyframes cyberEntry{0%{opacity:0;transform:scale(1.1) skewX(10deg);}100%{opacity:1;transform:scale(1) skewX(0deg);}}.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;border-bottom:1px solid rgba(255,0,60,0.3);padding-bottom:5px;}.title{color:#ff003c;font-size:11px;font-weight:900;letter-spacing:2px;text-shadow:0 0 10px rgba(255,0,60,0.8);text-transform:uppercase;}.close-btn{color:#fff;font-size:12px;cursor:pointer;opacity:0.5;transition:0.3s;}.close-btn:hover{opacity:1;color:#ff003c;transform:rotate(90deg);}.hud-box{position:relative;width:100%;height:90px;background:repeating-linear-gradient(0deg, rgba(0,0,0,0.8), rgba(0,0,0,0.8) 2px, transparent 2px, transparent 4px);border:1px solid rgba(255,0,60,0.2);display:flex;flex-direction:column;justify-content:center;align-items:center;margin-bottom:12px;box-shadow:inset 0 0 30px rgba(0,0,0,1);overflow:hidden;}.hud-box::before{content:'';position:absolute;inset:0;background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="2" cy="2" r="1" fill="%23ff003c" opacity="0.2"/></svg>');animation:panGrid 10s linear infinite;}@keyframes panGrid{100%{background-position:0 40px;}}.main-val{font-size:30px;font-weight:900;text-transform:uppercase;letter-spacing:3px;z-index:2;color:#fff;text-shadow:2px 2px 0px #ff003c, -2px -2px 0px #00ffff;}.val-scanning{color:#ff003c;animation:glitch 0.2s infinite;}@keyframes glitch{0%{transform:translate(0);}20%{transform:translate(-2px,2px);}40%{transform:translate(-2px,-2px);}60%{transform:translate(2px,2px);}80%{transform:translate(2px,-2px);}100%{transform:translate(0);}}.sub-val{color:#fff;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;margin-top:6px;z-index:2;background:rgba(255,0,60,0.2);padding:2px 10px;border-left:2px solid #ff003c;}.btn-group{display:flex;gap:10px;width:100%;margin-bottom:8px;}.btn{flex:1;padding:10px 0;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:900;cursor:pointer;text-transform:uppercase;transition:all 0.2s;border:none;}.btn-exec{background:#ff003c;color:#000;box-shadow:0 0 15px rgba(255,0,60,0.5);clip-path:polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);}.btn-exec:active{transform:scale(0.95);background:#cc0030;}.btn-hide{background:rgba(20,0,5,0.8);color:#ff003c;border:1px solid #ff003c;clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));}.footer{display:flex;justify-content:space-between;width:100%;font-family:'Rajdhani',sans-serif;font-size:9px;color:#ff003c;opacity:0.8;border-top:1px dashed rgba(255,0,60,0.3);padding-top:6px;}.ping{animation:blink 1s infinite;}@keyframes blink{50%{opacity:0.3;}}</style></head><body><div id='mini' onclick='openM()'><img src='https://i.postimg.cc/Nj6sjLBL/ic-launcher.jpg'></div><div id='main'><div class='header'><div class='title'> 𖣘 𝗔𝗡𝗨𝗥𝗔𝗚 𝗣𝗥𝗢 </div><div class='close-btn' onclick='closeM()'>&#10006;</div></div><div class='hud-box'><div id='main-txt' class='main-val'>READY</div><div id='sub-txt' class='sub-val'>AWAITING LINK</div></div><div class='btn-group'><button id='btn-l' class='btn btn-exec'>EXECUTE</button><button class='btn btn-hide' onclick='closeM()'>MINIMIZE</button></div><div class='footer'><span>SYS: ONLINE</span><span class='ping' id='ping-val'>MS: 34</span></div></div><script>var balance='0',state='waiting',results={},lastPeriod='';function getP(){var d=new Date();var min=d.getUTCHours()*60+d.getUTCMinutes();return d.getUTCFullYear()+String(d.getUTCMonth()+1).padStart(2,'0')+String(d.getUTCDate()).padStart(2,'0')+'1000'+(10001+min);}function openM(){document.getElementById('main').style.display='flex';document.getElementById('mini').style.display='none';if(window.TeamBridge){TeamBridge.resizeView(220,225); TeamBridge.syncOpenBoth();}render();}function closeM(){var m=document.getElementById('main');m.style.opacity='0';m.style.transform='scale(0.9)';setTimeout(()=>{m.style.display='none';m.style.opacity='1';m.style.transform='scale(1)';document.getElementById('mini').style.display='flex';if(window.TeamBridge)TeamBridge.resizeView(85,85);},200);}setInterval(()=>{document.getElementById('ping-val').innerText='MS: '+(Math.floor(Math.random()*20)+20);},1500);function route(r,bal){balance=bal;var bNum=parseFloat(bal.replace(/[^0-9.-]+/g,''))||0;if(r==='reg'||r==='waiting'||(r==='wingo'&&bNum<200)) state=r;else if(state!=='scanning'&&state!=='result') state='wingo';render();}function render(){var m=document.getElementById('main-txt'),s=document.getElementById('sub-txt'),b=document.getElementById('btn-l');if(state=='reg'){m.className='main-val';m.innerText='LOGIN';s.innerText='AUTH REQ';b.innerText='REGISTER';b.onclick=()=>{if(window.TeamBridge)TeamBridge.loadUrl('http://www.goabetg.com/#/register?invitationCode=178238889673');};}else if(state=='waiting'){m.className='main-val';m.innerText='SECURE';s.innerText='REQ: ₹200';b.innerText='DEPOSIT';b.onclick=()=>{if(window.TeamBridge)TeamBridge.loadUrl('https://goabetg.com/#/wallet/Recharge');};}else if(state=='wingo'){if(getP()==lastPeriod&&results[getP()]){state='result';render();return;}m.className='main-val';m.innerText='READY';s.innerText='AWAITING LINK';b.innerText='EXECUTE';b.onclick=()=>{startHack();};}else if(state=='scanning'){m.className='main-val val-scanning';m.innerText='SYNC...';s.innerText='BYPASSING FIREWALL';b.innerText='WORKING...';b.onclick=null;}else if(state=='result'){var c=results[getP()];m.className='main-val';m.innerText=c.sz; /* SIZE */ s.innerText='PRD: '+getP().slice(-5);b.innerText='NEXT EXEC';b.onclick=()=>{startHack();};}}function startHack(){var cp=getP();if(results[cp]){state='result';render();return;}if(cp==lastPeriod){return;}state='scanning';render();setTimeout(()=>{var n=window.TeamBridge?TeamBridge.getSyncedNumber(cp):Math.floor(Math.random()*10);var sz=(n<=4)?'SMALL':'BIG';results[cp]={n:n,sz:sz};lastPeriod=cp;state='result';render();},3500);}</script></body></html>
